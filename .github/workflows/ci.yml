name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine commit range
        id: commit-range
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              range="$before..${{ github.sha }}"
            else
              range="${{ github.sha }}^..${{ github.sha }}"
            fi
          fi
          echo "range=$range" >> "$GITHUB_OUTPUT"

      - name: Lint commit messages
        run: tooling/scripts/lint-commit-range.sh "${{ steps.commit-range.outputs.range }}"

  swift-package:
    name: Swift Package Tests
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  ssh-fixtures:
    name: SSH Fixture Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends expect openssh-client

      - name: Show Docker tooling
        run: |
          docker --version
          docker compose version

      - name: Run fixture gate
        run: tooling/ssh-fixtures/scripts/run-fixture-checks.sh "${RUNNER_TEMP}/ssh-fixture-artifacts"

      - name: Upload fixture artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ssh-fixture-artifacts-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/ssh-fixture-artifacts
          if-no-files-found: error
