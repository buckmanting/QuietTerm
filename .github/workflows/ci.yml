name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  swift-package:
    name: Swift Package Tests
    runs-on: macos-26
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
