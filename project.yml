name: QuietTerm
options:
  bundleIdPrefix: app.quietterm
  deploymentTarget:
    iOS: "18.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
packages:
  QuietTerm:
    path: .
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm.git
    from: 1.13.0
targets:
  QuietTerm:
    type: application
    platform: iOS
    sources:
      - Apps/QuietTermApp/Sources
    resources:
      - Apps/QuietTermApp/Resources
    dependencies:
      - package: QuietTerm
        product: QuietTermCore
      - package: SwiftTerm
        product: SwiftTerm
      - framework: Vendor/LibSSH2/CQuietTermLibSSH2.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quietterm.beta
        INFOPLIST_FILE: Apps/QuietTermApp/Resources/Info.plist
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
  QuietTermTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Apps/QuietTermApp/Tests/QuietTermAppTests
    dependencies:
      - target: QuietTerm
      - package: QuietTerm
        product: QuietTermCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quietterm.beta.tests
        GENERATE_INFOPLIST_FILE: YES
  QuietTermUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - Apps/QuietTermApp/Tests/QuietTermUITests
    dependencies:
      - target: QuietTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.quietterm.beta.uitests
        GENERATE_INFOPLIST_FILE: YES
